<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>朱凱榆｜個人履歷</title>

<style>
body {
  margin: 0;
  font-family: "Noto Sans TC", Arial;
  background: #eee;
}

/* 主容器 */
.container {
  max-width: 1000px;
  margin: 30px auto;
  display: flex;
  background: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* 左側 */
.sidebar {
  width: 30%;
  background: #555;
  color: white;
  padding: 30px 20px;
}

.profile-img {
  width: 100%;
  border-radius: 8px;
  margin-bottom: 20px;
}

/* 左側標題 */
.side-title {
  margin-top: 20px;
  font-weight: bold;
  font-size: 18px;
  border-bottom: 2px solid white;
  padding-bottom: 5px;
}

/* 右側 */
.content {
  width: 70%;
  padding: 40px;
  position: relative;
}

/* 大標題 */
.big-name {
  font-size: 40px;
  font-weight: bold;
  letter-spacing: 2px;
}

.subtitle {
  font-size: 18px;
  color: #666;
  margin-bottom: 30px;
}

/* 曲線背景 */
.content::before {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  width: 300px;
  height: 200px;
  background: #ddd;
  border-bottom-left-radius: 200px;
}

/* 區塊 */
.section {
  margin-bottom: 25px;
}

.section h2 {
  font-size: 20px;
  color: #444;
  margin-bottom: 10px;
}

/* 技能 */
.skill-bar {
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.skill-level {
  height: 10px;
  width: 0;
  background: #555;
  transition: 1.5s;
}

/* 按鈕 */
button {
  margin-top: 10px;
  padding: 8px 12px;
  border: none;
  background: #333;
  color: white;
  cursor: pointer;
}

button:hover {
  background: black;
}
</style>
</head>

<body>

<!-- 🎵 音樂 -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

  <!-- 左側 -->
  <div class="sidebar">
    <img src="images/IMG_0075.JPG" class="profile-img">

    <div class="side-title">聯絡方式</div>
    <p>Email<br>kaiyuzhu8170@gmail.com</p>

    <div class="side-title">技能</div>
    <p>排球<br>團隊合作</p>

    <!-- 音樂控制 -->
    <button onclick="toggleMusic()">音樂播放/暫停</button>
    <input type="range" min="0" max="1" step="0.01" onchange="changeVolume(this.value)">
  </div>

  <!-- 右側 -->
  <div class="content">

    <div class="big-name">朱凱榆</div>
    <div class="subtitle">亞洲大學學生</div>

    <div class="section">
      <h2>自我介紹</h2>
      <p>
        我是一位積極學習的學生，具備良好的團隊合作能力與責任感，
        長期參與排球訓練，培養紀律與抗壓能力。
      </p>
    </div>

    <div class="section">
      <h2>經歷</h2>
      <p>校隊排球訓練</p>
      <p>社團活動參與</p>
    </div>

    <div class="section">
      <h2>學歷</h2>
      <p>嘉義女中 - 2025</p>
      <p>亞洲大學 聽力暨語言治療學系</p>
    </div>

    <div class="section">
      <h2>技能熟練度</h2>

      排球
      <div class="skill-bar">
        <div class="skill-level" data-level="90%"></div>
      </div>

      團隊合作
      <div class="skill-bar">
        <div class="skill-level" data-level="85%"></div>
      </div>

    </div>

    <button onclick="window.print()">下載PDF</button>

  </div>

</div>

<script>
const audio = document.getElementById("bgm");

function toggleMusic() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

function changeVolume(value) {
  audio.volume = value;
}

window.onload = () => {
  const skills = document.querySelectorAll(".skill-level");
  skills.forEach(skill => {
    skill.style.width = skill.dataset.level;
  });
};
</script>

</body>
</html>
