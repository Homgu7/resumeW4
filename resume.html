<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>朱凱榆｜履歷</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #e5e5e5;
}

/* 主容器 */
.container {
  max-width: 900px;
  margin: 40px auto;
  background: #666;
  color: white;
  padding: 40px 20px;
  position: relative;
}

/* 中線 */
.timeline::before {
  content: "";
  position: absolute;
  top: 0;
  left: 50%;
  width: 2px;
  height: 100%;
  background: white;
  transform: translateX(-50%);
  z-index: 1;
}

/* 頭像 */
.top-header {
  text-align: center;
  position: relative;
  z-index: 3; /* 文字在最上層 */
}

.profile-img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 4px solid white;
}

.title {
  font-size: 28px;
  margin-top: 10px;
}

/* 左右欄 */
.row {
  display: flex;
  margin-top: 30px;
  position: relative;
  z-index: 2;
}

.col {
  width: 50%;
  padding: 20px;
}

/* 左右對齊 */
.left {
  text-align: right;
}

.right {
  text-align: left;
}

/* 圓點 */
.dot {
  position: absolute;
  left: 50%;
  width: 12px;
  height: 12px;
  background: white;
  border-radius: 50%;
  transform: translateX(-50%);
  z-index: 2;
}

/* 區塊標題 */
h2 {
  border-bottom: 1px solid white;
  display: inline-block;
  padding-bottom: 5px;
}

/* 技能條 */
.skill-bar {
  background: #aaa;
  height: 8px;
  margin: 5px 0;
}

.skill-level {
  height: 8px;
  width: 0;
  background: white;
  transition: 1.5s;
}

/* 音樂按鈕 */
.music {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 5;
}

button {
  padding: 8px 12px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="music.mp3">
</audio>

<div class="container timeline">

  <!-- 上方 -->
  <div class="top-header">
    <img src="images/IMG_0075.JPG" class="profile-img">
    <div class="title">朱凱榆</div>
    <div>亞洲大學</div>
  </div>

  <!-- 第一排 -->
  <div class="row">
    <div class="col left">
      <h2>個人資訊</h2>
      <p>Email: kaiyuzhu8170@gmail.com</p>
      <p>AU ID:114018079</p>
    </div>
    <div class="col right">
      <h2>經歷</h2>
      <p>校隊排球訓練</p>
      <p>社團活動參與</p>
    </div>
    <div class="dot" style="top:200px;"></div>
  </div>

  <!-- 第二排 -->
  <div class="row">
    <div class="col left">
      <h2>技能</h2>
      排球
      <div class="skill-bar">
        <div class="skill-level" data-level="82%"></div>
      </div>

      團隊合作
      <div class="skill-bar">
        <div class="skill-level" data-level="87%"></div>
      </div>
    
     創造力
      <div class="skill-bar">
        <div class="skill-level" data-level="75%"></div>
      </div>
    </div>


    <div class="col right">
      <h2>學歷</h2>
      <p>嘉義女中 - 2025</p>
      <p>亞洲大學 聽語系</p>
    </div>

    <div class="dot" style="top:420px;"></div>
  </div>

</div>

<!-- 音樂控制 -->
<div class="music">
  <button onclick="toggleMusic()">🎵</button>
</div>

<script>
const audio = document.getElementById("bgm");

function toggleMusic() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

window.onload = () => {
  document.querySelectorAll(".skill-level").forEach(el=>{
    el.style.width = el.dataset.level;
  });
};
</script>

</body>
</html>
