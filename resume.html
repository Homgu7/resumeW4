<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>朱凱榆｜履歷</title>

<style>
body {
  margin: 0;
  font-family: "Noto Sans TC", Arial;
  background: #eae7e2;
}

/* 卡片 */
.card {
  max-width: 850px;
  margin: 50px auto;
  background: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  border-radius: 10px;
  overflow: hidden;
}

/* 上方背景 */
.header {
  height: 220px;
  background: url("images/背景.PNG")  center / cover no-repeat
  position: relative;
}

/* 漸層遮罩 */
.header::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.3);
}

/* 🎵 音樂按鈕 */
.music-btn {
  position: absolute;
  top: 15px;
  right: 15px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  z-index: 3;
  transition: 0.3s;
}

.music-btn:hover {
  background: rgba(255,255,255,1);
  transform: scale(1.1);
}

.music-btn.playing {
  background: #4CAF50;
  color: white;
}

/* 頭像 */
.profile {
  position: absolute;
  bottom: -50px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
}

.profile img {
  width: 100px;
  height: 100px;
  object-fit: cover;   /* 🔥 關鍵：自動裁切不變形 */
  border-radius: 50%;
  border: 5px solid white;
}

/* 名字 */
.name {
  text-align: center;
  margin-top: 60px;
}

.name h1 {
  margin: 5px;
}

.name p {
  color: gray;
}

/* 內容 */
.content {
  padding: 30px;
}

/* 自我介紹 */
.about {
  text-align: center;
  margin-bottom: 30px;
  line-height: 1.6;
}

/* 分欄 */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* 區塊 */
.section h2 {
  font-size: 16px;
  border-bottom: 2px solid #ccc;
  padding-bottom: 5px;
  margin-bottom: 10px;
}

/* 技能星星 */
.stars {
  color: gold;
}

/* 興趣圖 */
.hobbies {
  display: flex;
  gap: 10px;
}

.hobbies img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  object-fit: cover;
}
</style>
</head>

<body>

<!-- 音樂 -->
<audio id="bgm" loop>
  <source src="music.mp3">
</audio>

<div class="card">

  <!-- 上方 -->
  <div class="header">

    <!-- 🎵 音樂按鈕 -->
    <div class="music-btn" onclick="toggleMusic()">🎵</div>

    <!-- 頭像 -->
    <div class="profile">
      <img src="images/IMG_0075.JPG">
    </div>
  </div>

  <!-- 名字 -->
  <div class="name">
    <h1>朱凱榆</h1>
    <p>亞洲大學｜聽語系學生</p>
  </div>

  <!-- 內容 -->
  <div class="content">

    <!-- 自我介紹 -->
    <div class="about">
      我是亞洲大學聽語系學生，具備良好的溝通能力與團隊合作經驗。<br>
      平時參與排球校隊訓練，培養紀律與抗壓性，<br>
      對於學習新技能與挑戰新事物充滿熱情。
    </div>

    <div class="grid">

      <!-- 左 -->
      <div>

        <div class="section">
          <h2>經歷 Experience</h2>
          <p>排球校隊成員</p>
          <p>社團活動參與</p>
        </div>

        <div class="section">
          <h2>專長</h2>
          <p>團隊領導</p>
          <p>體育運動</p>
        </div>

        <div class="section">
          <h2>技能 Skills</h2>
          <p>溝通能力 <span class="stars">★★★★★</span></p>
          <p>團隊合作 <span class="stars">★★★★☆</span></p>
        </div>

      </div>

      <!-- 右 -->
      <div>

        <div class="section">
          <h2>學歷 Education</h2>
          <p>亞洲大學 聽語系</p>
          <p>嘉義女中</p>
        </div>

        <div class="section">
          <h2>個人特質</h2>
          <ul>
            <li>負責任</li>
            <li>主動學習</li>
            <li>抗壓性高</li>
          </ul>
        </div>

        <div class="section">
          <h2>興趣 Interests</h2>
          <div class="hobbies">
            <img src="images/hobby1.JPG">
            <img src="images/hobby2.jpg">
            <img src="images/hobby3.JPG">
          </div>
        </div>

      </div>

    </div>

  </div>

</div>

<script>
const audio = document.getElementById("bgm");

function toggleMusic() {
  const btn = document.querySelector(".music-btn");

  if (audio.paused) {
    audio.play();
    btn.classList.add("playing");
  } else {
    audio.pause();
    btn.classList.remove("playing");
  }
}
</script>

</body>
</html>
